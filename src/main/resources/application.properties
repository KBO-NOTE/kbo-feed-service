spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.application.name=kbo-feed-service
spring.jpa.open-in-view=false
server.forward-headers-strategy=framework

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

info.app.name=${spring.application.name}
info.app.env=${SPRING_PROFILES_ACTIVE:local}
external.user-service.base-url=${USER_SERVICE_BASE_URL:}
logging.file.path=${LOGGING_FILE_PATH:./logs}

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=${logging.file.path}
server.tomcat.accesslog.prefix=access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.file-date-format=.yyyy-MM-dd
server.tomcat.accesslog.pattern=%{yyyy-MM-dd HH:mm:ss}t %a "%r" %s %b %D
