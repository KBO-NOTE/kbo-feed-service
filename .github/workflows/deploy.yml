name: Feed Service CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
            docker build -t ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }} \
                        -t ghcr.io/kbo-note/kbo-note-feed-service:latest .

      - name: Push Docker Image
        run: |
            docker push ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }}
            docker push ghcr.io/kbo-note/kbo-note-feed-service:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            DEPLOY_DIR=/home/makersfarm/kbo-note/kbo-feed-service/deploy
            DEPLOY_LOG_FILE="$DEPLOY_DIR/deploy.log"

            mkdir -p "$DEPLOY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd "$DEPLOY_DIR"
            ./deploy.sh ${{ github.sha }}

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] deployed feed-service sha=${{ github.sha }}" >> "$DEPLOY_LOG_FILE"
            docker logout ghcr.io
