name: Feed Service CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
            docker build -t ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }} \
                        -t ghcr.io/kbo-note/kbo-note-feed-service:latest .

      - name: Push Docker Image
        run: |
            docker push ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }}
            docker push ghcr.io/kbo-note/kbo-note-feed-service:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        env:
          USER_SERVICE_BASE_URL: ${{ secrets.USER_SERVICE_BASE_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          envs: USER_SERVICE_BASE_URL
          script: |
            LOG_DIR=~/kbo-note/kbo-feed-service/logs
            DEPLOY_LOG_FILE="$LOG_DIR/deploy.log"

            mkdir -p "$LOG_DIR"
            mkdir -p ~/kbo-note/kbo-feed-service/deploy
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Deploy script started (sha=${{ github.sha }})" | tee -a "$DEPLOY_LOG_FILE"

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Logging in to GHCR" | tee -a "$DEPLOY_LOG_FILE"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin >> "$DEPLOY_LOG_FILE" 2>&1

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Running deploy.sh with SHA: ${{ github.sha }}" | tee -a "$DEPLOY_LOG_FILE"
            cd ~/kbo-note/kbo-feed-service/deploy
            export USER_SERVICE_BASE_URL="$USER_SERVICE_BASE_URL"
            ./deploy.sh ${{ github.sha }} >> "$DEPLOY_LOG_FILE" 2>&1
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] deploy.sh finished successfully" | tee -a "$DEPLOY_LOG_FILE"
            
            docker logout ghcr.io >> "$DEPLOY_LOG_FILE" 2>&1
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Deploy script completed. Log file: $DEPLOY_LOG_FILE" | tee -a "$DEPLOY_LOG_FILE"
