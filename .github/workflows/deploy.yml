name: Feed Service CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
            docker build -t ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }} \
                        -t ghcr.io/kbo-note/kbo-note-feed-service:latest .

      - name: Push Docker Image
        run: |
            docker push ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }}
            docker push ghcr.io/kbo-note/kbo-note-feed-service:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            LOG_DIR=~/kbo-note/kbo-feed-service/logs
            LOG_FILE="$LOG_DIR/$(date +%F).log"
            STREAM_PID_FILE="$LOG_DIR/docker-log-stream.pid"
            STREAM_SCRIPT="$LOG_DIR/docker-log-stream.sh"
            ENV_FILE=/etc/kbo-feed-service/feed.env
            DEPLOY_ENV=~/kbo-note/kbo-feed-service/deploy/.env

            mkdir -p "$LOG_DIR"
            mkdir -p ~/kbo-note/kbo-feed-service/deploy
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Deploy script started (sha=${{ github.sha }})" | tee -a "$LOG_FILE"

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Checking env file: $ENV_FILE" | tee -a "$LOG_FILE"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[$(date +"%Y-%m-%d %H:%M:%S")] [ERROR] Missing env file: $ENV_FILE" | tee -a "$LOG_FILE"
              exit 1
            fi

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Validating required key: DB_SCHEMA" | tee -a "$LOG_FILE"
            if ! grep -qE '^[[:space:]]*DB_SCHEMA=' "$ENV_FILE"; then
              echo "[$(date +"%Y-%m-%d %H:%M:%S")] [ERROR] Missing required env in $ENV_FILE: DB_SCHEMA" | tee -a "$LOG_FILE"
              exit 1
            fi

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Syncing env file to deploy path" | tee -a "$LOG_FILE"
            cp "$ENV_FILE" "$DEPLOY_ENV" >> "$LOG_FILE" 2>&1
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Synced env file to: $DEPLOY_ENV" | tee -a "$LOG_FILE"

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Logging in to GHCR" | tee -a "$LOG_FILE"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin >> "$LOG_FILE" 2>&1

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Running deploy.sh with SHA: ${{ github.sha }}" | tee -a "$LOG_FILE"
            cd ~/kbo-note/kbo-feed-service/deploy
            ./deploy.sh ${{ github.sha }} >> "$LOG_FILE" 2>&1
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] deploy.sh finished successfully" | tee -a "$LOG_FILE"

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Resolving running container for server logs" | tee -a "$LOG_FILE"
            TARGET_IMAGE_SHA="ghcr.io/kbo-note/kbo-note-feed-service:${{ github.sha }}"
            TARGET_IMAGE_LATEST="ghcr.io/kbo-note/kbo-note-feed-service:latest"
            CONTAINER_ID=$(docker ps --filter "ancestor=$TARGET_IMAGE_SHA" --format "{{.ID}}" | head -n 1)
            if [ -z "$CONTAINER_ID" ]; then
              CONTAINER_ID=$(docker ps --filter "ancestor=$TARGET_IMAGE_LATEST" --format "{{.ID}}" | head -n 1)
            fi
            if [ -z "$CONTAINER_ID" ]; then
              CONTAINER_ID=$(docker ps --format "{{.ID}} {{.Image}}" | grep "kbo-note-feed-service" | head -n 1 | awk '{print $1}')
            fi

            if [ -n "$CONTAINER_ID" ]; then
              if [ -f "$STREAM_PID_FILE" ] && kill -0 "$(cat "$STREAM_PID_FILE")" 2>/dev/null; then
                OLD_STREAM_PID=$(cat "$STREAM_PID_FILE")
                echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Stopping previous log stream (pid=$OLD_STREAM_PID)" | tee -a "$LOG_FILE"
                kill "$OLD_STREAM_PID" || true
                sleep 1
              fi

              printf '%s\n' \
                '#!/bin/sh' \
                'CONTAINER_ID="$1"' \
                'LOG_DIR="$2"' \
                '' \
                'docker logs -f --since=0s "$CONTAINER_ID" 2>&1 | awk -v log_dir="$LOG_DIR" '\''{ file=log_dir "/" strftime("%F") ".log"; print >> file; fflush(file) }'\''' > "$STREAM_SCRIPT"
              chmod +x "$STREAM_SCRIPT"

              echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Starting continuous server log stream (container: $CONTAINER_ID)" | tee -a "$LOG_FILE"
              nohup "$STREAM_SCRIPT" "$CONTAINER_ID" "$LOG_DIR" >/dev/null 2>&1 &
              NEW_STREAM_PID=$!
              echo "$NEW_STREAM_PID" > "$STREAM_PID_FILE"
              echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Continuous server log stream started (pid=$NEW_STREAM_PID)" | tee -a "$LOG_FILE"
            else
              echo "[$(date +"%Y-%m-%d %H:%M:%S")] [WARN] Could not find running kbo-note-feed-service container" | tee -a "$LOG_FILE"
              docker ps --format "table {{.ID}}\t{{.Image}}\t{{.Names}}\t{{.Status}}" | tee -a "$LOG_FILE"
            fi
            
            docker logout ghcr.io >> "$LOG_FILE" 2>&1
            echo "[$(date +"%Y-%m-%d %H:%M:%S")] [INFO] Deploy script completed. Log file: $LOG_FILE" | tee -a "$LOG_FILE"
