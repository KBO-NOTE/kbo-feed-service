name: Feed Service CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Select workflow mode"
        required: true
        default: full
        type: choice
        options:
          - full
          - deploy_only
      image_tag:
        description: "Image tag to deploy when deploy_only (e.g. latest or commit sha)"
        required: true
        default: latest
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/kbo-note/kbo-note-feed-service

concurrency:
  group: feed-service-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_mode == 'full' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  build_and_push:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_mode == 'full' }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs:
      - test
      - build_and_push
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'deploy_only') || (needs.test.result == 'success' && needs.build_and_push.result == 'success')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE_TAG: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'deploy_only') && inputs.image_tag || github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            DEPLOY_DIR=/home/makersfarm/kbo-note/kbo-feed-service/deploy
            DEPLOY_LOG_FILE="$DEPLOY_DIR/deploy.log"

            mkdir -p "$DEPLOY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd "$DEPLOY_DIR"
            ./deploy.sh "$DEPLOY_IMAGE_TAG"

            echo "[$(date +"%Y-%m-%d %H:%M:%S")] deployed feed-service tag=$DEPLOY_IMAGE_TAG" >> "$DEPLOY_LOG_FILE"
            docker logout ghcr.io
